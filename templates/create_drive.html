{% extends "base.html" %}

{% block title %}Create Placement Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="mb-4 text-center">Create Placement Drive</h2>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                {% if success %}
                    <div class="alert alert-success">{{ success }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="job_title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea name="job_description" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <input type="text" name="eligibility_criteria" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" name="application_deadline" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Create Drive</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
