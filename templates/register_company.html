{% extends "base.html" %}

{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="mb-4 text-center">Company Registration</h2>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                {% if success %}
                    <div class="alert alert-success">{{ success }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Company Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">HR Contact</label>
                        <input type="text" name="hr_contact" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="text" name="website" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Register Company</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
